services:
  - type: web
    name: mednexus-api
    env: node
    region: oregon
    plan: free
    nodeVersion: "22"
    buildCommand: bash ./render-build.sh
    startCommand: npm run start:prod
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: mednexus-db
          property: connectionString
      - key: APP_URL
        value: https://mednexus-api.onrender.com
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: ADMIN_IP_ALLOWLIST
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        sync: false

  # The frontend is built by the mednexus-api build (render-build.sh) into
  # new-frontend/dist and served by the backend itself (src/app.ts). This keeps
  # the UI and /api on the SAME origin, so uploads no longer hit a separate
  # domain (which caused cold-start hangs behind the free-tier static site).

databases:
  - name: mednexus-db
    databaseName: mednexus
    region: oregon
    plan: free