services:
  - type: web
    name: mednexus-api
    env: node
    region: oregon
    plan: free
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: npm run start:prod
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: mednexus-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: ADMIN_IP_ALLOWLIST
        sync: false
      - key: APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        sync: false

  - type: web
    name: mednexus-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd new-frontend && npm ci && npm run build
    staticPublishPath: ./new-frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://mednexus-api.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: mednexus-db
    databaseName: mednexus
    region: oregon
    plan: free